<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. S. R. GUPTA | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f5f5f5;
            --accent-color: #4a4a4a;
            --dim-text: #888;
            --spacing: 5vw;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            padding: 0 var(--spacing);
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem var(--spacing);
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dim-text);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 20px;
            transition: 0.3s ease;
        }

        .nav-links a:hover { color: var(--text-color); }

        /* --- HEADER (Repositioned Caption) --- */
        header {
            margin: 25vh 0 12vh 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Keeps everything grouped on the left */
        }

        header h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 9vw, 6.5rem);
            font-weight: 700;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 2rem;
            letter-spacing: -3px;
        }

        header p {
            font-size: clamp(0.85rem, 1.2vw, 1rem);
            color: var(--dim-text);
            max-width: 500px;
            border-top: 1px solid var(--accent-color); /* Line above text instead of side */
            padding-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- SMART MASONRY LAYOUT --- */
        .gallery {
            column-count: 2; 
            column-gap: 3vw;
            width: 100%;
            margin-bottom: 10vh;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 3vw; 
            position: relative;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.8s ease;
        }

        .gallery-item:hover img {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.02);
        }

        .gallery-item::after {
            content: attr(data-label);
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.6rem;
            font-family: 'Syncopate';
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        /* --- FOOTER --- */
        footer {
            padding: 4rem 0 2rem 0;
            border-top: 1px solid #1a1a1a;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dim-text);
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (min-width: 1024px) {
            .gallery { column-count: 3; }
        }

        @media (max-width: 768px) {
            :root { --spacing: 1.5rem; }
            header { margin-top: 18vh; }
            header h1 { letter-spacing: -1px; }
            header p { max-width: 100%; }

            .gallery {
                column-count: 2; 
                column-gap: 12px;
            }

            .gallery-item { margin-bottom: 12px; }

            .gallery-item img {
                filter: grayscale(0%);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .gallery { column-count: 1; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">M.S.R. GUPTA</a>
        <div class="nav-links">
            <a href="#work">Archive</a>
            <a href="mailto:hello@example.com">Contact</a>
        </div>
    </nav>

    <header>
        <h1>Static <br>Moments <br>In Motion.</h1>
        <p>A collection of visual experiments exploring the intersection of light, fragments, and fleeting perspectives.</p>
    </header>

    <main class="gallery" id="work">
        <div class="gallery-item" data-label="001 / LUMINESCENCE">
            <img src="images/1.jpeg" alt="Visual 01">
        </div>
        <div class="gallery-item" data-label="002 / HERITAGE">
            <img src="images/2.jpeg" alt="Visual 02">
        </div>
        <div class="gallery-item" data-label="003 / ASCENSION">
            <img src="images/3.jpeg" alt="Visual 03">
        </div>
        <div class="gallery-item" data-label="004 / HORIZON">
            <img src="images/4.jpeg" alt="Visual 04">
        </div>
        <div class="gallery-item" data-label="005 / SOLITUDE">
            <img src="images/5.jpeg" alt="Visual 05">
        </div>
        <div class="gallery-item" data-label="006 / ETHER">
            <img src="images/6.jpeg" alt="Visual 06">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 M. S. R. GUPTA | All Perspectives Reserved.</p>
    </footer>

</body>
</html>
