<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. S. R. GUPTA | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f5f5f5;
            --accent-color: #4a4a4a;
            --dim-text: #888;
            --spacing: 5vw;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            padding: 0 var(--spacing);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem var(--spacing);
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dim-text);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 20px;
            transition: 0.3s ease;
        }

        .nav-links a:hover { color: var(--text-color); }

        /* --- HEADER --- */
        header {
            margin: 22vh 0 12vh 0;
            max-width: 1200px;
        }

        header h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 9vw, 6.5rem);
            font-weight: 700;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 3rem;
            letter-spacing: -3px;
        }

        header p {
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            color: var(--dim-text);
            max-width: 420px;
            margin-left: auto;
            border-left: 1px solid var(--accent-color);
            padding: 0.5rem 0 0.5rem 2rem;
        }

        /* --- NON-CROPPING CREATIVE GRID --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 4vw;
            margin-bottom: 15vh;
            align-items: start; /* Ensures items stay at their natural height */
        }

        .gallery-item {
            position: relative;
            background-color: transparent; /* Removed background to avoid "box" feel */
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Desktop Positioning Logic - Width based, heights remain natural */
        .gallery-item:nth-child(1) { grid-column: span 7; }
        .gallery-item:nth-child(2) { grid-column: span 5; margin-top: 15vh; }
        .gallery-item:nth-child(3) { grid-column: span 10; grid-offset: 1; margin: 8vh auto; }
        .gallery-item:nth-child(4) { grid-column: span 6; }
        .gallery-item:nth-child(5) { grid-column: span 5; margin-top: -10vh; margin-left: 2vw; }

        .gallery-item img {
            width: 100%;
            height: auto; /* Natural aspect ratio maintained */
            display: block;
            filter: grayscale(100%);
            opacity: 0.7;
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-item:hover img {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.02);
        }

        /* Data Labels */
        .gallery-item::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px; /* Positioned below the photo */
            left: 0;
            font-size: 0.6rem;
            font-family: 'Syncopate';
            color: var(--dim-text);
            opacity: 0;
            transition: 0.4s;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        /* --- FOOTER --- */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4rem 0 2rem 0;
            border-top: 1px solid #1a1a1a;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dim-text);
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            :root { --spacing: 1.5rem; }
            
            header { margin-top: 18vh; }
            header h1 { letter-spacing: -1px; }
            header p { margin-left: 0; }

            .gallery {
                display: flex;
                flex-direction: column;
                gap: 4rem; /* More space for labels on mobile */
            }

            .gallery-item, 
            .gallery-item:nth-child(n) { 
                grid-column: span 12 !important; 
                margin-top: 0 !important; 
                margin-bottom: 0 !important;
            }

            .gallery-item img {
                filter: grayscale(0%);
                opacity: 1;
            }
            .gallery-item::after {
                opacity: 1;
                bottom: -20px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">M.S.R. GUPTA</a>
        <div class="nav-links">
            <a href="#work">Work</a>
            <a href="mailto:hello@example.com">Contact</a>
        </div>
    </nav>

    <header>
        <h1>Static <br>Moments <br>In Motion.</h1>
        <p>A collection of visual experiments exploring the intersection of light, fragments, and fleeting perspectives.</p>
    </header>

    <main class="gallery" id="work">
        <!-- These will now scale perfectly without cropping -->
        <div class="gallery-item" data-label="01 / MONOLITH">
            <img src="https://images.unsplash.com/photo-1449034446853-66c86144b0ad?auto=format&fit=crop&q=80&w=1200" alt="Architecture">
        </div>
        <div class="gallery-item" data-label="02 / SHADOWS">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=1200" alt="Portrait">
        </div>
        <div class="gallery-item" data-label="03 / EXPANSIONS">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&q=80&w=1800" alt="Nature">
        </div>
        <div class="gallery-item" data-label="04 / NIGHTFALL">
            <img src="https://images.unsplash.com/photo-1496449903678-68ddcb189a24?auto=format&fit=crop&q=80&w=1200" alt="Urban">
        </div>
        <div class="gallery-item" data-label="05 / PERSPECTIVE">
            <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=1200" alt="Camera">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 M. S. R. GUPTA</p>
    </footer>

</body>
</html>
