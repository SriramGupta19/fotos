<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. S. R. GUPTA | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f5f5f5;
            --accent-color: #4a4a4a;
            --dim-text: #888;
            --spacing: 5vw;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            padding: 0 var(--spacing);
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem var(--spacing);
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-wrap: nowrap;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(0.75rem, 2vw, 1.1rem);
            letter-spacing: 1px;
            text-decoration: none;
            color: var(--text-color);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dim-text);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s ease;
            white-space: nowrap;
        }

        .nav-links a:hover { color: var(--text-color); }

        /* --- HEADER --- */
        header {
            margin: 25vh 0 12vh 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        header h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 9vw, 6.5rem);
            font-weight: 700;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 2rem;
            letter-spacing: -3px;
        }

        header p {
            font-size: clamp(0.85rem, 1.2vw, 1rem);
            color: var(--dim-text);
            max-width: 500px;
            border-top: 1px solid var(--accent-color);
            padding-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- SMART MASONRY LAYOUT --- */
        .gallery {
            column-count: 2; 
            column-gap: 3vw;
            width: 100%;
            margin-bottom: 10vh;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 3vw; 
            position: relative;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.8s ease;
        }

        /* WEB HOVER EFFECT */
        @media (hover: hover) {
            .gallery-item:hover img {
                filter: grayscale(0%);
                opacity: 1;
                transform: scale(1.02);
            }
            .gallery-item:hover::after {
                opacity: 1;
            }
        }

        /* MOBILE SCROLL ACTIVE STATE (Triggered by JS) */
        .gallery-item.active img {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.02);
        }
        .gallery-item.active::after {
            opacity: 1;
        }

        .gallery-item::after {
            content: attr(data-label);
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.6rem;
            font-family: 'Syncopate';
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        /* --- FOOTER --- */
        footer {
            padding: 4rem 0 2rem 0;
            border-top: 1px solid #1a1a1a;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dim-text);
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (min-width: 1024px) {
            .gallery { column-count: 3; }
        }

        @media (max-width: 768px) {
            :root { --spacing: 1.2rem; }
            header { margin-top: 18vh; }
            header h1 { letter-spacing: -1px; }
            header p { max-width: 100%; }

            .gallery {
                column-count: 2; 
                column-gap: 12px;
            }

            .gallery-item { margin-bottom: 12px; }
        }

        @media (max-width: 480px) {
            .gallery { column-count: 1; }
            .nav-links { gap: 10px; }
            .logo { letter-spacing: 0px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">M.S.R. GUPTA</a>
        <div class="nav-links">
            <a href="#work">Archive</a>
            <a href="mailto:hello@example.com">Contact</a>
        </div>
    </nav>

    <header>
        <h1>Static <br>Moments <br>In Motion.</h1>
        <p>A collection of visual experiments exploring the intersection of light, fragments, and fleeting perspectives.</p>
    </header>

    <main class="gallery" id="work">
        <div class="gallery-item" data-label="001 / LUMINESCENCE">
            <img src="images/1.jpeg" alt="Visual 01">
        </div>
        <div class="gallery-item" data-label="002 / HERITAGE">
            <img src="images/2.jpeg" alt="Visual 02">
        </div>
        <div class="gallery-item" data-label="003 / ASCENSION">
            <img src="images/3.jpeg" alt="Visual 03">
        </div>
        <div class="gallery-item" data-label="004 / HORIZON">
            <img src="images/4.jpeg" alt="Visual 04">
        </div>
        <div class="gallery-item" data-label="005 / WITNESS">
            <img src="images/5.jpeg" alt="Visual 05">
        </div>
        <div class="gallery-item" data-label="006 / ETHER">
            <img src="images/6.jpeg" alt="Visual 06">
        </div>
        <div class="gallery-item" data-label="007 / BLOOM">
            <img src="images/7.jpeg" alt="Visual 07">
        </div>
        <div class="gallery-item" data-label="008 / RADIANCE">
            <img src="images/8.jpeg" alt="Visual 08">
        </div>
        <div class="gallery-item" data-label="009 / DUSK">
            <img src="images/9.jpeg" alt="Visual 09">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 M. S. R. GUPTA | All Perspectives Reserved.</p>
    </footer>

    <script>
        // Use Intersection Observer to detect when images enter the center of the viewport
        const observerOptions = {
            root: null, // use the viewport
            rootMargin: '-20% 0px -20% 0px', // trigger when image is in the center 60% of the screen
            threshold: 0.5 // trigger when 50% of the image is visible
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (window.innerWidth <= 768) { // Only apply scroll effect on mobile
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    } else {
                        entry.target.classList.remove('active');
                    }
                }
            });
        }, observerOptions);

        // Apply observer to all gallery items
        document.querySelectorAll('.gallery-item').forEach(item => {
            observer.observe(item);
        });
    </script>
</body>
</html>
